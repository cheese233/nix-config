[package]
name = "microdoh3"
version = "0.1.0"
edition = "2021"

[dependencies]
# Sans-IO QUIC transport (no async runtime).
noq-proto = { version = "=1.0.1", features = ["rustls", "ring", "tracing-log"] }
# Sync UDP socket state with GRO/GSO/ECN/PKTINFO (no async runtime).
noq-udp = { version = "=1.0.1", default-features = false, features = ["tracing-log"] }
rustls = { version = "0.23", default-features = false, features = ["std", "ring", "tls12", "logging"] }
webpki-roots = "1"
bytes = "1"
simple-dns = "0.11"
nix = { version = "0.30", features = [
    "process",
    "sched",
    "signal",
    "socket",
    "net",
    "event",
    "time",
    "mman",
    "fs",
    "resource",
] }
clap = { version = "4", features = ["derive", "env"] }
log = "0.4"
env_logger = "0.11"
thiserror = "2"

[profile.release]
lto = "thin"
codegen-units = 1
panic = "abort"
